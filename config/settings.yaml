# 博道会医療法人 multi-agent-shogun 設定 (Task M C案 shim統合版)
# yohey-w/multi-agent-shogun 公式骨格 + DD-146 R1-R4 博道会魂

language: ja
shell: bash

# 役職mapping (副医院長 97c02986 強制降下 verbatim)
agents:
  shogun: fukuincho       # 将軍 = 副医院長 (Claude.ai Opus 4.7)
  karo: kuro              # 家老 = クロちゃん (SecondPC)
  ashigaru1: kouchan      # 足軽1 = こうちゃん (main_pc)
  ashigaru2: sakura       # 足軽2 = さくら (SecondPC)

# CLI割当 (公式: claude/codex/copilot/kimi、gemini暫定alias)
cli:
  default: claude
  agents:
    fukuincho: claude
    kuro: claude
    kouchan: claude
    sakura: claude
  audit:
    primary: codex
    secondary: gemini   # cli_adapter.sh shim alias 経由 (Phase B精査予定)

# 博道会shim統合 (DD-146 R1-R4)
shim:
  hakudokai_root: ./shim/hakudokai
  modules:
    - hakudokai_departure.sh
    - hakudokai_heartbeat.py
    - hakudokai_inbox_watcher.py
    - hakudokai_pii_detector.py
    - hakudokai_role_init.py
    - hakudokai_patient_chat.py
    - hakudokai_patient_notification.py
    - hakudokai_patient_pwa.py
    - hakudokai_fast_payment.py
    - hakudokai_paylight_integration.py
    - hakudokai_ai_jimucho.py
    - hakudokai_billing_tier.py
    - hakudokai_dashboard_sync.py
    - hakudokai_skill_candidate.py
    - hakudokai_skill_review.py
    - hakudokai_dev_lessons.py
    - hakudokai_resistance_guard.py
    - hakudokai_audit_misconduct.py
    - hakudokai_watchdog.sh
    - hakudokai_start_watchers.sh
    - hakudokai_fukuincho_watcher.sh
    - hakudokai_fukuincho_poll.py
    - hakudokai_clinic_switch.sh
    - hakudokai_heartbeat_archive.py
    - hakudokai_heartbeat_check.py
    - hakudokai_inbox_write.py
    - hakudokai_init_agents.sh
    - hakudokai_minimal_install.sh
    - hakudokai_fukuincho_reverse_watcher.sh
    - hakudokai_fukuincho_reverse_poll.py
    - hakudokai_escalation.py
    - hakudokai_audit_scheduler.sh
    - hakudokai_daily_summary.py
    - hakudokai_git_guard.py

# エスカレーション設定
escalation:
  L3b_codex_consultation: true
  L4_ntfy_notification: true
  L4_approval_timeout: 1800
  L4_max_reminders: 3
  safety_mode_threshold_hours: 24

# 監査スケジュール
audit_schedule:
  daily: "06:00"
  weekly: "Sunday 21:00"
  on_commit_paths:
    - shim/hakudokai/
    - instructions/
    - .claude/settings.json
    - CLAUDE.md

# Supabase連携 (~/.openclaw/env から流用)
supabase:
  env_file: ~/.openclaw/env
  project_id: pxvnhkiqyxkejzivspde
  pc_handshake_required: true
  rls_enforce: true

# PC-agent mapping (クロスPC配信用)
# agent が所属するPCを定義。別PCのagentへの inbox_write は Supabase経由で配信。
pc_mapping:
  main_pc:
    agents: [shogun, karo, ashigaru1, ashigaru3, ashigaru4, ashigaru5, ashigaru6, ashigaru7, gunshi, fukuincho]
    is_local: true
  second_pc:
    agents: [ashigaru2]
    supabase_bridge: true
    pc_id: second_pc

# tmux構成 (公式準拠)
tmux:
  sessions:
    - name: shogun
      windows: [main]
    - name: multiagent
      windows: [agents]

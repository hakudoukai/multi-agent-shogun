# 博道会医療法人 multi-agent-shogun 設定 (Task M C案 shim統合版)
# yohey-w/multi-agent-shogun 公式骨格 + DD-146 R1-R4 博道会魂

language: ja
shell: bash

# 役職定義 (§18 PC×アカウント配置ルール準拠 — CLAUDE.md §18.1)
# 旧体制 persona alias (fukuincho / kuro / kouchan / sakura / 副医院長) は §18 移行で
# 廃止。役名 = §18 agent ID をそのまま使用 (shogun / karo / gunshi / ashigaru1-3 /
# ashigaru5-8)。ashigaru4 = 欠番 (PC 境界の視覚的区切り)。
# Reference: shim/hakudokai/_section18_roles.py (single source of truth)

# CLI割当 (公式: claude/codex/copilot/kimi、gemini暫定alias)
# §18 役名で entry を持つ (旧 persona 名は廃止)
cli:
  default: claude
  agents:
    shogun: claude
    karo: claude
    gunshi: claude
    ashigaru1: claude       # MainPC 通常
    ashigaru2: claude       # MainPC 通常
    ashigaru3: claude       # MainPC 非常時 +1
    ashigaru5: claude       # SecondPC 通常
    ashigaru6: claude       # SecondPC 通常
    ashigaru7: claude       # SecondPC 通常
    ashigaru8: claude       # SecondPC 非常時 +1
  audit:
    primary: codex
    secondary: gemini   # cli_adapter.sh shim alias 経由 (Phase B精査予定)

# 博道会shim統合 (DD-146 R1-R4)
shim:
  hakudokai_root: ./shim/hakudokai
  modules:
    - hakudokai_departure.sh
    - hakudokai_heartbeat.py
    - hakudokai_inbox_watcher.py
    - hakudokai_pii_detector.py
    - hakudokai_role_init.py
    - hakudokai_patient_chat.py
    - hakudokai_patient_notification.py
    - hakudokai_patient_pwa.py
    - hakudokai_fast_payment.py
    - hakudokai_paylight_integration.py
    - hakudokai_ai_jimucho.py
    - hakudokai_billing_tier.py
    - hakudokai_dashboard_sync.py
    - hakudokai_skill_candidate.py
    - hakudokai_skill_review.py
    - hakudokai_dev_lessons.py
    - hakudokai_resistance_guard.py
    - hakudokai_audit_misconduct.py
    - hakudokai_watchdog.sh
    - hakudokai_start_watchers.sh
    - hakudokai_fukuincho_watcher.sh
    - hakudokai_fukuincho_poll.py
    - hakudokai_clinic_switch.sh
    - hakudokai_heartbeat_archive.py
    - hakudokai_heartbeat_check.py
    - hakudokai_inbox_write.py
    - hakudokai_init_agents.sh
    - hakudokai_minimal_install.sh
    - hakudokai_fukuincho_reverse_watcher.sh
    - hakudokai_fukuincho_reverse_poll.py
    - hakudokai_escalation.py
    - hakudokai_audit_scheduler.sh
    - hakudokai_daily_summary.py
    - hakudokai_git_guard.py
    - hakudokai_kuro_desktop_watcher.sh
    - hakudokai_kuro_desktop_poll.py
    - hakudokai_task_sync.sh
    - hakudokai_activity_monitor.sh

# エスカレーション設定
escalation:
  L3b_codex_consultation: true
  L4_ntfy_notification: true
  L4_approval_timeout: 1800
  L4_max_reminders: 3
  safety_mode_threshold_hours: 24

# 監査スケジュール
audit_schedule:
  daily: "06:00"
  weekly: "Sunday 21:00"
  on_commit_paths:
    - shim/hakudokai/
    - instructions/
    - .claude/settings.json
    - CLAUDE.md

# Supabase連携 (~/.hakudokai/env から流用)
supabase:
  env_file: ~/.hakudokai/env
  project_id: pxvnhkiqyxkejzivspde
  pc_handshake_required: true
  rls_enforce: true

# PC-agent mapping (クロスPC配信用)
# agent が所属するPCを定義。別PCのagentへの inbox_write は Supabase経由で配信。
# 2026-05-06 §18 PC × アカウント配置ルール準拠 (CLAUDE.md §18.1):
#   MainPC (sasebo@sasebo.or.jp): shogun + karo + gunshi + ashigaru1+2 [+3 非常時]
#   SecondPC (hakudoukai@gmail.com): ashigaru5+6+7 [+8 非常時]
#   足軽4 = 欠番 (PC 境界の視覚的区切り)
# 注: ashigaru3 は非常時のみ起動 (= ~/.openclaw/enable_ashigaru3 フラグ)、
#     PC 配信先としては MainPC に属するため main_pc.agents に保持。
#     ashigaru8 も同様の理由で second_pc.agents に保持。
pc_mapping:
  main_pc:
    agents: [shogun, karo, gunshi, ashigaru1, ashigaru2, ashigaru3]
    is_local: true
    pc_id: main_pc
  second_pc:
    agents: [ashigaru5, ashigaru6, ashigaru7, ashigaru8]
    supabase_bridge: true
    pc_id: second_pc
  kuro_desktop:
    agents: [kuro_desktop]
    supabase_bridge: true
    pc_id: kuro_desktop

# tmux構成 (公式準拠)
tmux:
  sessions:
    - name: shogun
      windows: [main]
    - name: multiagent
      windows: [agents]
